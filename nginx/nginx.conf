pid /tmp/nginx.pid;

events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip Komprimierung aktivieren
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    server {
        # Unprivileged Nginx uses User Space Ports (usually 8080)
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "no-referrer-when-downgrade";

        # AVIF-Fallback nur für .png (Mit Caching)
        location ~ ^/projects/(?<name>.+)\.png$ {
            expires max;
            add_header Cache-Control "public, no-transform";
            try_files /avif/$name.avif $uri =404;
        }

        # Alles andere in /projects normal ausliefern
        location /projects/ {
            expires max;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        # Beispiel: /images bleibt unverändert
        location /images/ {
            expires max;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

        location /contact-form {
            proxy_pass http://backend:3000;  # Name des Docker-Services
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

}
